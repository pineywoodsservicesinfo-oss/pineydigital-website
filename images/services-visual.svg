<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-services">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow-services">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#12121a"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6366f1" stroke-width="0.5"/>
    </pattern>
    <rect width="800" height="500" fill="url(#grid)"/>
  </g>

  <!-- Central hub -->
  <g transform="translate(400, 250)" filter="url(#shadow-services)">
    <circle cx="0" cy="0" r="70" fill="#1e1e2e" stroke="url(#grad-main)" stroke-width="3"/>
    <circle cx="0" cy="0" r="50" fill="url(#grad-main)" opacity="0.2"/>

    <!-- Hub icon - interconnected nodes -->
    <circle cx="-15" cy="-15" r="8" fill="#6366f1" filter="url(#glow-services)"/>
    <circle cx="15" cy="-15" r="8" fill="#8b5cf6" filter="url(#glow-services)"/>
    <circle cx="0" cy="15" r="8" fill="#22c55e" filter="url(#glow-services)"/>
    <line x1="-15" y1="-15" x2="15" y2="-15" stroke="#6366f1" stroke-width="2"/>
    <line x1="-15" y1="-15" x2="0" y2="15" stroke="#6366f1" stroke-width="2"/>
    <line x1="15" y1="-15" x2="0" y2="15" stroke="#8b5cf6" stroke-width="2"/>
  </g>

  <!-- Service nodes - arranged around the hub -->

  <!-- Top left: Database -->
  <g transform="translate(120, 100)">
    <rect x="-50" y="-35" width="100" height="70" rx="12" fill="#1e1e2e" stroke="#6366f1" stroke-width="2" filter="url(#shadow-services)"/>
    <ellipse cx="0" cy="-15" rx="25" ry="10" fill="none" stroke="#6366f1" stroke-width="2"/>
    <path d="M -25 -15 L -25 15 Q -25 25 0 25 Q 25 25 25 15 L 25 -15" fill="none" stroke="#6366f1" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
    <text x="0" y="55" font-family="system-ui" font-size="12" text-anchor="middle" fill="#888">Database</text>
  </g>

  <!-- Top right: API -->
  <g transform="translate(680, 100)">
    <rect x="-50" y="-35" width="100" height="70" rx="12" fill="#1e1e2e" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow-services)"/>
    <text x="0" y="5" font-family="system-ui" font-size="20" text-anchor="middle" font-weight="bold" fill="#8b5cf6">{ }</text>
    <text x="0" y="55" font-family="system-ui" font-size="12" text-anchor="middle" fill="#888">API</text>
  </g>

  <!-- Left: Auth -->
  <g transform="translate(80, 250)">
    <rect x="-50" y="-35" width="100" height="70" rx="12" fill="#1e1e2e" stroke="#22c55e" stroke-width="2" filter="url(#shadow-services)"/>
    <rect x="-20" y="-20" width="40" height="30" rx="4" fill="none" stroke="#22c55e" stroke-width="2"/>
    <circle cx="0" cy="-5" r="8" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M -12 15 Q 0 5 12 15" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="0" y="55" font-family="system-ui" font-size="12" text-anchor="middle" fill="#888">Auth</text>
  </g>

  <!-- Right: Dashboard -->
  <g transform="translate(720, 250)">
    <rect x="-50" y="-35" width="100" height="70" rx="12" fill="#1e1e2e" stroke="#6366f1" stroke-width="2" filter="url(#shadow-services)"/>
    <rect x="-35" y="-25" width="25" height="20" rx="3" fill="#6366f1" opacity="0.6"/>
    <rect x="-5" y="-25" width="40" height="20" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="-35" y="0" width="70" height="25" rx="3" fill="#8b5cf6" opacity="0.3"/>
    <text x="0" y="55" font-family="system-ui" font-size="12" text-anchor="middle" fill="#888">Dashboard</text>
  </g>

  <!-- Bottom left: Notifications -->
  <g transform="translate(120, 400)">
    <rect x="-50" y="-35" width="100" height="70" rx="12" fill="#1e1e2e" stroke="#f59e0b" stroke-width="2" filter="url(#shadow-services)"/>
    <path d="M -15 -15 L -15 5 Q -15 15 0 15 Q 15 15 15 5 L 15 -15" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="0" cy="-20" r="5" fill="#f59e0b"/>
    <line x1="-8" y1="18" x2="8" y2="18" stroke="#f59e0b" stroke-width="2"/>
    <text x="0" y="55" font-family="system-ui" font-size="12" text-anchor="middle" fill="#888">Notifications</text>
  </g>

  <!-- Bottom right: Integrations -->
  <g transform="translate(680, 400)">
    <rect x="-50" y="-35" width="100" height="70" rx="12" fill="#1e1e2e" stroke="#22c55e" stroke-width="2" filter="url(#shadow-services)"/>
    <circle cx="-15" cy="-10" r="12" fill="none" stroke="#22c55e" stroke-width="2"/>
    <circle cx="15" cy="-10" r="12" fill="none" stroke="#22c55e" stroke-width="2"/>
    <circle cx="0" cy="10" r="12" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="0" y="55" font-family="system-ui" font-size="12" text-anchor="middle" fill="#888">Integrations</text>
  </g>

  <!-- Connection lines from hub to nodes -->
  <g stroke="#6366f1" stroke-width="2" opacity="0.6" stroke-dasharray="4,4">
    <line x1="330" y1="190" x2="170" y2="130" marker-end="url(#arrow)"/>
    <line x1="470" y1="190" x2="630" y2="130" marker-end="url(#arrow)"/>
    <line x1="330" y1="250" x2="130" y2="250" marker-end="url(#arrow)"/>
    <line x1="470" y1="250" x2="670" y2="250" marker-end="url(#arrow)"/>
    <line x1="330" y1="310" x2="170" y2="370" marker-end="url(#arrow)"/>
    <line x1="470" y1="310" x2="630" y2="370" marker-end="url(#arrow)"/>
  </g>

  <!-- Title -->
  <text x="400" y="480" font-family="system-ui" font-size="14" text-anchor="middle" fill="#888">Connected Architecture</text>
</svg>