<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-about">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow-about">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#12121a"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="120" fill="#6366f1" opacity="0.08"/>
  <circle cx="700" cy="420" r="150" fill="#8b5cf6" opacity="0.06"/>

  <!-- Main content - Growth visualization -->
  <g transform="translate(100, 50)">
    <!-- Before state - Messy -->
    <g transform="translate(0, 80)">
      <text x="140" y="0" font-family="system-ui" font-size="16" text-anchor="middle" fill="#888">Before</text>
      <rect x="0" y="20" width="280" height="180" rx="16" fill="#1e1e2e" stroke="#4a4a5a" stroke-width="1"/>

      <!-- Scattered items -->
      <rect x="20" y="40" width="80" height="40" rx="8" fill="#ef4444" opacity="0.6"/>
      <rect x="120" y="50" width="60" height="30" rx="6" fill="#f59e0b" opacity="0.5"/>
      <rect x="60" y="90" width="90" height="35" rx="8" fill="#ef4444" opacity="0.4"/>
      <rect x="180" y="80" width="70" height="50" rx="8" fill="#6b7280" opacity="0.5"/>
      <rect x="30" y="140" width="100" height="40" rx="8" fill="#f59e0b" opacity="0.4"/>
      <rect x="150" y="145" width="80" height="35" rx="6" fill="#6b7280" opacity="0.6"/>

      <!-- X marks -->
      <g stroke="#ef4444" stroke-width="2" opacity="0.8">
        <line x1="210" y1="30" x2="250" y2="60"/>
        <line x1="250" y1="30" x2="210" y2="60"/>
      </g>
    </g>

    <!-- Arrow -->
    <g transform="translate(300, 150)">
      <path d="M 0 40 L 80 40 L 60 20 M 80 40 L 60 60" stroke="url(#grad-purple)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-about)"/>
      <text x="40" y="80" font-family="system-ui" font-size="14" text-anchor="middle" fill="#6366f1">Transform</text>
    </g>

    <!-- After state - Organized -->
    <g transform="translate(420, 80)">
      <text x="140" y="0" font-family="system-ui" font-size="16" text-anchor="middle" fill="#22c55e">After</text>
      <rect x="0" y="20" width="280" height="180" rx="16" fill="#1e1e2e" stroke="#6366f1" stroke-width="2" filter="url(#shadow-about)"/>

      <!-- Organized grid -->
      <rect x="15" y="35" width="120" height="70" rx="8" fill="url(#grad-purple)" opacity="0.9"/>
      <rect x="145" y="35" width="120" height="70" rx="8" fill="url(#grad-purple)" opacity="0.7"/>
      <rect x="15" y="115" width="80" height="70" rx="8" fill="#22c55e" opacity="0.8"/>
      <rect x="105" y="115" width="80" height="70" rx="8" fill="#22c55e" opacity="0.6"/>
      <rect x="195" y="115" width="70" height="70" rx="8" fill="url(#grad-green)" opacity="0.7"/>

      <!-- Checkmark -->
      <g transform="translate(250, 10)">
        <circle cx="15" cy="15" r="15" fill="#22c55e"/>
        <polyline points="8,15 13,20 22,10" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>

  <!-- Bottom stats -->
  <g transform="translate(200, 350)">
    <text x="200" y="40" font-family="system-ui" font-size="48" text-anchor="middle" font-weight="bold" fill="white">47%</text>
    <text x="200" y="70" font-family="system-ui" font-size="14" text-anchor="middle" fill="#888">Average Efficiency Gain</text>

    <text x="400" y="40" font-family="system-ui" font-size="48" text-anchor="middle" font-weight="bold" fill="#22c55e">2.4x</text>
    <text x="400" y="70" font-family="system-ui" font-size="14" text-anchor="middle" fill="#888">Productivity Increase</text>
  </g>

  <!-- Decorative nodes -->
  <g transform="translate(50, 380)" opacity="0.5">
    <circle cx="0" cy="0" r="6" fill="#6366f1"/>
    <circle cx="30" cy="10" r="4" fill="#8b5cf6"/>
    <line x1="0" y1="0" x2="30" y2="10" stroke="#6366f1" stroke-width="1"/>
  </g>

  <g transform="translate(700, 100)" opacity="0.5">
    <circle cx="0" cy="0" r="8" fill="#8b5cf6"/>
    <circle cx="40" cy="20" r="5" fill="#6366f1"/>
    <circle cx="20" cy="50" r="6" fill="#22c55e"/>
    <line x1="0" y1="0" x2="40" y2="20" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="40" y1="20" x2="20" y2="50" stroke="#6366f1" stroke-width="1"/>
  </g>
</svg>